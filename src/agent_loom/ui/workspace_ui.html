          back.clearRect(0, 0, this.w, this.h);
          front.clearRect(0, 0, this.w, this.h);

          // World transform
          const k = this.transform.k;
          const tx = this.transform.x;
          const ty = this.transform.y;

          const worldToScreen = (x, y) => ({ x: x*k + tx, y: y*k + ty });

          // Underlay: clusters
          for (const c of this.clusters.values()){
            const p = worldToScreen(c.cx, c.cy);
            const r = 220 * k;
            const g = back.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
            const hue = c.hue || 210;
            const a1 = (document.documentElement.dataset.theme === 'dark') ? 0.10 : 0.07;
            g.addColorStop(0, `hsla(${hue}, 80%, 60%, ${a1})`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            back.fillStyle = g;
            back.beginPath();
            back.arc(p.x, p.y, r, 0, Math.PI*2);
            back.fill();
          }

          // Edges
          const hover = this.hoverId;
          const selected = this.selectedId;
          const active = hover || selected;
          const fade = active ? 0.14 : 0.72;

          const isNeighbor = (id) => {
            if (!active) return true;
            if (id === active) return true;
            for (const e of this.edges){
              if (e.from === active && e.to === id) return true;
              if (e.to === active && e.from === id) return true;
            }
            return false;
          };

          this.edges.forEach(e => {
            const a = this.nodes.get(e.from);
            const b = this.nodes.get(e.to);
            if (!a || !b) return;
            const aOk = isNeighbor(a.id);
            const bOk = isNeighbor(b.id);
            const strong = active && aOk && bOk;
            const alpha = strong ? 0.62 : fade;
            const p1 = worldToScreen(a.x, a.y);
            const p2 = worldToScreen(b.x, b.y);
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.max(1, Math.hypot(dx, dy));
            const nx = -dy / dist;
            const ny = dx / dist;
            const bend = (hash01(e.from + '->' + e.to) - 0.5) * 26;
            const cx = (p1.x + p2.x)/2 + nx * bend;
            const cy = (p1.y + p2.y)/2 + ny * bend;

            back.beginPath();
            back.moveTo(p1.x, p1.y);
            back.quadraticCurveTo(cx, cy, p2.x, p2.y);
            back.lineWidth = strong ? 2.0 : 1.2;
            if (e.kind === 'external'){
              back.setLineDash([6, 5]);
              back.strokeStyle = rgba(col.info, alpha);
            } else {
              back.setLineDash([]);
              back.strokeStyle = rgba(col.textMuted, alpha);
            }
            back.stroke();
          });
          back.setLineDash([]);

          // Nodes
          const nodes = Array.from(this.nodes.values());
          nodes.sort((a, b) => (a.kind === 'external') - (b.kind === 'external'));

          const mono = getComputedStyle(document.documentElement).getPropertyValue('--font-mono') || 'monospace';
          front.font = `12px ${mono}`;
          front.textBaseline = 'middle';
          front.textAlign = 'left';

          nodes.forEach(n => {
            const p = worldToScreen(n.x, n.y);
            const left = p.x - (n.w/2) * k;
            const top = p.y - (n.h/2) * k;
            const w = n.w * k;
            const h = n.h * k;
            const ok = isNeighbor(n.id);
            const alpha = active ? (ok ? 1 : 0.18) : 1;

            // base fill
            let fill = (n.kind === 'external')
              ? rgb(mix(col.info, col.bgPanel, 0.18))
              : rgb(mix(col.primary, col.bgPanel, 0.14));

            if (state.graphMode === 'worktrees' && n.kind !== 'external'){
              const s = n.status;
              if (s === 'dirty') fill = rgb(mix(col.danger, col.bgPanel, 0.16));
              else if (s === 'clean') fill = rgb(mix(col.success, col.bgPanel, 0.14));
              else if (s === 'missing') fill = rgb(mix(col.warning, col.bgPanel, 0.14));
            }

            // shadow
            front.save();
            front.globalAlpha = alpha;
            front.fillStyle = fill;
            front.strokeStyle = (n.id === this.selectedId)
              ? rgb(mix(col.primary, col.borderStrong, 0.85))
              : rgba(col.borderStrong, 0.55);
            front.lineWidth = (n.id === this.selectedId) ? 2.0 : 1.0;

            // rounded rect
            const r = 10 * k;
            const rr = (x, y, w, h, r) => {
              front.beginPath();
              front.moveTo(x + r, y);
              front.arcTo(x + w, y, x + w, y + h, r);
              front.arcTo(x + w, y + h, x, y + h, r);
              front.arcTo(x, y + h, x, y, r);
              front.arcTo(x, y, x + w, y, r);
              front.closePath();
            };
            rr(left, top, w, h, r);
            front.fill();
            front.stroke();

            // status ring
            if (state.graphMode === 'worktrees' && n.kind !== 'external'){
              let ring = 'transparent';
              if (n.status === 'dirty') ring = rgba(col.danger, 0.80);
              if (n.status === 'clean') ring = rgba(col.success, 0.78);
              if (n.status === 'missing') ring = rgba(col.warning, 0.82);
              if (ring !== 'transparent'){
                rr(left + 2*k, top + 2*k, w - 4*k, h - 4*k, Math.max(6*k, r - 4*k));
                front.strokeStyle = ring;
                front.lineWidth = 2.2;
                front.stroke();
              }
            }

            // label
            if (this.settings.labels){
              front.fillStyle = col.textMain;
              front.globalAlpha = alpha;
              front.fillText(n.labelShort, left + 12*k, top + h/2);
              if (n.kind === 'external'){
                front.fillStyle = rgb(col.info);
                front.globalAlpha = alpha;
                front.textAlign = 'right';
                front.fillText('ext', left + w - 12*k, top + h/2);
                front.textAlign = 'left';
              }
            }
            front.restore();
          });

          back.restore();
          front.restore();
        }
      }

      let graphEngine = null;

      function ensureGraphEngine(){
        if (graphEngine) return graphEngine;
        els.graphStage.innerHTML = '';
        graphEngine = new GraphEngine(els.graphStage, {
          onSelect: (id) => {
            if (state.graphMode === 'services' || state.resolvedMode !== 'poly'){
              selectService(id);
              return;
            }
            const group = state.filters.group || '';
            if (!group){
              selectService(id);
              return;
            }
            const it = state.items.find(x => x.mode === 'poly' && String(x.group) === group && String(x.repo) === id);
            if (it) selectWorktree(it);
            else selectService(id);
          }
        });
        return graphEngine;
      }

      function renderGraph(){
        const nodes = state.graph.nodes || [];
        if (!nodes.length){
          graphEngine = null;
          els.graphStage.innerHTML = '';
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.style.margin = '16px';
          empty.textContent = (state.resolvedMode === 'poly')
            ? 'No services graph found. Run `ws services refresh-index` to generate services/index.json.'
            : 'Services graph is only available in poly mode.';
          els.graphStage.appendChild(empty);
          return;
        }

        const eng = ensureGraphEngine();
        const first = !eng._hasData;
        eng._hasData = true;
        eng.setData(state.graph, state.etagGraph);
        if (first) eng.fit();
      }

      function wireEvents(){
        els.viewList.addEventListener('click', () => setView('list'));
        els.viewGraph.addEventListener('click', () => setView('graph'));
        els.graphServices.addEventListener('click', () => setGraphMode('services'));
        els.graphWorktrees.addEventListener('click', () => setGraphMode('worktrees'));

        // Graph controls
        if (els.gFit) els.gFit.addEventListener('click', () => {
          if (state.view !== 'graph') return;
          const eng = ensureGraphEngine();
          eng.fit();
        });
        if (els.gReset) els.gReset.addEventListener('click', () => {
          if (state.view !== 'graph') return;
          const eng = ensureGraphEngine();
          eng.reset();
          eng.fit();
        });
        if (els.gFreeze) els.gFreeze.addEventListener('click', () => {
          const eng = ensureGraphEngine();
          const next = !eng.settings.frozen;
          eng.setSettings({ frozen: next });
          els.gFreeze.setAttribute('aria-pressed', next ? 'true' : 'false');
          els.gFreeze.textContent = next ? 'Frozen' : 'Freeze';
        });
        if (els.gLabels) els.gLabels.addEventListener('click', () => {
          const eng = ensureGraphEngine();
          const next = !eng.settings.labels;
          eng.setSettings({ labels: next });
          els.gLabels.setAttribute('aria-pressed', next ? 'true' : 'false');
        });
        if (els.gExternal) els.gExternal.addEventListener('click', () => {
          const eng = ensureGraphEngine();
          const next = !eng.settings.showExternal;
          eng.setSettings({ showExternal: next });
          els.gExternal.setAttribute('aria-pressed', next ? 'true' : 'false');
          renderGraph();
        });

        els.themeLight.addEventListener('click', () => applyTheme('light', true));
        els.themeDark.addEventListener('click', () => applyTheme('dark', true));

        els.btnRefresh.addEventListener('click', () => refreshAll(true));
        els.btnClear.addEventListener('click', () => {
          state.filters = { group: '', repo: '', q: '', dirty: '0', detached: '0', missing: '0' };
          els.f_q.value = '';
          els.f_dirty.value = '0';
          els.f_detached.value = '0';
          els.f_missing.value = '0';
          if (els.f_group) els.f_group.value = '';
          if (els.f_repo) els.f_repo.value = '';
          persistSoon();
          refreshAll(true);
        });

        els.f_mode.addEventListener('change', () => {
          state.mode = String(els.f_mode.value || 'auto');
          persistSoon();
          refreshAll(true);
        });
        els.f_group.addEventListener('change', () => {
          state.filters.group = String(els.f_group.value || '');
          persistSoon();
          refreshAll(true);
        });
        els.f_repo.addEventListener('change', () => {
          state.filters.repo = String(els.f_repo.value || '');
          persistSoon();
          refreshAll(true);
        });
        els.f_dirty.addEventListener('change', () => {
          state.filters.dirty = String(els.f_dirty.value || '0');
          persistSoon();
          refreshAll(true);
        });
        els.f_detached.addEventListener('change', () => {
          state.filters.detached = String(els.f_detached.value || '0');
          persistSoon();
          refreshAll(true);
        });
        els.f_missing.addEventListener('change', () => {
          state.filters.missing = String(els.f_missing.value || '0');
          persistSoon();
          refreshAll(true);
        });
        let qTimer = 0;
        els.f_q.addEventListener('input', () => {
          clearTimeout(qTimer);
          qTimer = setTimeout(() => {
            state.filters.q = String(els.f_q.value || '');
            persistSoon();
            refreshAll(true);
          }, 160);
        });

        els.f_poll.addEventListener('change', () => {
          state.pollSeconds = Number(els.f_poll.value || '0') || 0;
          persistSoon();
          startPolling();
        });

        if (els.scrim) els.scrim.addEventListener('click', closeDetailsOverlay);
        window.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && els.scrim.classList.contains('is-open')) closeDetailsOverlay();
        });

        // Graph keyboard shortcuts
        window.addEventListener('keydown', (e) => {
          if (state.view !== 'graph') return;
          if (els.scrim.classList.contains('is-open')) return;
          const key = (e.key || '').toLowerCase();
          if (key === 'f'){
            e.preventDefault();
            const eng = ensureGraphEngine();
            eng.fit();
          }
          if (key === 'r'){
            e.preventDefault();
            const eng = ensureGraphEngine();
            eng.reset();
          }
          if (key === ' '){
            e.preventDefault();
            const eng = ensureGraphEngine();
            const next = !eng.settings.frozen;
            eng.setSettings({ frozen: next });
            els.gFreeze.setAttribute('aria-pressed', next ? 'true' : 'false');
            els.gFreeze.textContent = next ? 'Frozen' : 'Freeze';
          }
        });

        // Splitter resizing
        let dragging = false;
        let startX = 0;
        let startW = 0;
        function onMove(ev){
          if (!dragging) return;
          const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
          const dx = startX - x;
          const w = Math.max(320, Math.min(760, startW + dx));
          document.documentElement.style.setProperty('--details-w', `${w}px`);
        }
        function onUp(){
          if (!dragging) return;
          dragging = false;
          document.body.classList.remove('resizing');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onUp);
        }
        els.splitter.addEventListener('mousedown', (e) => {
          dragging = true;
          document.body.classList.add('resizing');
          startX = e.clientX;
          startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--details-w')) || 460;
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        });
        els.splitter.addEventListener('touchstart', (e) => {
          dragging = true;
          document.body.classList.add('resizing');
          startX = e.touches[0].clientX;
          startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--details-w')) || 460;
          window.addEventListener('touchmove', onMove, { passive: true });
          window.addEventListener('touchend', onUp);
        });
      }

      async function refreshAll(force){
        if (state.pollInFlight && !force) return;
        state.pollInFlight = true;
        try{
          await refreshMeta();
          await Promise.all([loadWorktrees(), loadGraph()]);
          if (state.view === 'graph') renderGraph();
          // Restore selection
          if (state.selected && state.selected.kind === 'worktree'){
            const key = state.selected.key;
            const it = state.items.find(x => (x._key === key));
            if (it){
              state.selected.mode = it.mode;
              state.selected.group = it.group || '';
              state.selected.repo = it.repo || '';
              state.selected.id = it.id || '';
            }
          }
        } catch(e){
          setPoll('idle', 'Error');
          renderDetailsEmpty(String(e && e.message ? e.message : e));
        } finally {
          state.pollInFlight = false;
        }
      }

      function startPolling(){
        if (state.pollTimer){
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        const n = Number(state.pollSeconds) || 0;
        if (n <= 0){
          setPoll('idle', 'Idle');
          return;
        }
        setPoll('live', 'Live');
        state.pollTimer = setInterval(() => refreshAll(false), n * 1000);
      }

      async function boot(){
        loadPersisted();
        const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
        applyTheme(theme, false);
        setView(state.view);
        setGraphMode(state.graphMode);
        wireEvents();
        await refreshAll(true);
        startPolling();
        // If we had a saved selection, load it.
        if (state.selected){
          if (state.selected.kind === 'service' && state.selected.name) await loadServiceDetail(state.selected.name);
          if (state.selected.kind === 'worktree') await loadWorktreeDetail(state.selected);
        }
      }

      boot();
    })();
  </script>
