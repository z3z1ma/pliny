<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="dark light"/>
  <title>Loom Dashboard</title>
  <style>
    /* Atom One (dark + light) inspired. No gradients. No theatrics. */
    :root{
      /* Deep Atom Dark */
      --bg: #21252b;
      --panel: #282c34;
      --panel2: #2c313a;
      --border: #3b4048;
      --border2: #4b5263;

      --fg: #abb2bf;
      --fg2: #dcdfe4;
      --muted: #5c6370;

      /* "Beautiful Accents" - slightly more vibrant/pastel against dark */
      --red: #ff7b86;
      --green: #a7df79;
      --yellow: #e5c07b;
      --blue: #61afef;
      --purple: #d57ced;
      --cyan: #56b6c2;
      --orange: #d19a66;

      --shadow: 0 4px 12px rgba(0,0,0,.35);
      --r: 6px;
      --r2: 4px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --fs: 13px;
      --lh: 1.5;

      --pad: 12px;
      --gap: 12px;

      --btn: #353b45;
      --btnHover: #3e4451;
      --btnBorder: #3e4451;

      --focus: rgba(97,175,239,.35);
      --sel: #3e4451;

      --ok: var(--green);
      --warn: var(--yellow);
      --bad: var(--red);
      --info: var(--blue);
    }

    :root[data-theme="light"]{
      --bg: #fafafa;
      --panel: #ffffff;
      --panel2: #f0f1f4;
      --border: #d0d3d8;
      --border2: #c0c4cc;

      --fg: #383a42;
      --fg2: #202227;
      --muted: #9ca3af;

      --red: #e45649;
      --green: #50a14f;
      --yellow: #986801;
      --blue: #4078f2;
      --purple: #a626a4;
      --cyan: #0184bc;
      --orange: #c18401;

      --shadow: 0 4px 12px rgba(0,0,0,.08);

      --btn: #f2f3f5;
      --btnHover: #e5e7eb;
      --btnBorder: #d0d3d8;

      --focus: rgba(64,120,242,.24);
      --sel: #e5e7eb;

      --ok: var(--green);
      --warn: var(--yellow);
      --bad: var(--red);
      --info: var(--blue);
    }

    *{
      box-sizing:border-box;
      scrollbar-color: var(--border2) var(--panel);
      scrollbar-width: thin;
    }
    *::-webkit-scrollbar{ width:10px; height:10px; }
    *::-webkit-scrollbar-track{ background: var(--panel); }
    *::-webkit-scrollbar-thumb{
      background: var(--border2);
      border-radius: 8px;
      border: 2px solid var(--panel);
    }
    :root[data-theme="light"] *::-webkit-scrollbar-thumb{ background: var(--border); }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--fg);
      font: var(--fs)/var(--lh) var(--sans);
      overflow:hidden;
    }
    a{ color: var(--blue); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    button,input,select,textarea{ font: inherit; color:inherit; }
    code,pre{ font-family: var(--mono); }

    .app{
      height:100%;
      display:grid;
      grid-template-columns: 240px 1fr;
    }

    /* Sidebar */
    .side{
      background: var(--panel);
      border-right: 1px solid var(--border);
      display:flex;
      flex-direction:column;
      min-width: 220px;
    }
    .brand{
      padding: 12px 12px 8px;
      display:flex;
      gap: 10px;
      align-items:center;
      border-bottom: 1px solid var(--border);
    }
    .logo{
      width: 26px; height: 26px;
      border-radius: 7px;
      background: var(--panel2);
      border: 1px solid var(--border);
      display:grid; place-items:center;
      color: var(--blue);
      font-weight: 800;
      font-family: var(--mono);
      box-shadow: none;
      user-select:none;
    }
    .brandTitle{
      display:flex;
      flex-direction:column;
      gap: 1px;
      min-width:0;
    }
    .brandTitle .t{
      font-weight: 750;
      letter-spacing:.2px;
      color: var(--fg2);
      font-size: 13px;
    }
    .brandTitle .s{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav{
      padding: 8px;
      display:flex;
      flex-direction:column;
      gap: 3px;
      overflow:auto;
      flex: 1 1 auto;
    }
    .nav a{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 7px 8px;
      border-radius: 8px;
      color: var(--fg);
      border: 1px solid transparent;
      user-select:none;
    }
    .nav a:hover{
      background: var(--panel2);
      border-color: var(--border);
      text-decoration:none;
    }
    .nav a.active{
      background: var(--sel);
      border-color: var(--border2);
    }
    .nav .k{
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      margin-left:auto;
    }

    .sideFooter{
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display:flex;
      flex-direction:column;
      gap: 6px;
    }
    .statusRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .dot{
      width: 8px; height: 8px;
      border-radius: 999px;
      display:inline-block;
      margin-right: 8px;
      background: var(--muted);
    }
    .dot.ok{ background: var(--ok); }
    .dot.warn{ background: var(--warn); }
    .dot.bad{ background: var(--bad); }

    /* Main */
    .main{
      display:flex;
      flex-direction:column;
      height:100%;
      overflow:hidden;
    }
    .top{
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .viewTitle{
      font-weight: 760;
      letter-spacing:.2px;
      color: var(--fg2);
      margin-right: 6px;
      white-space:nowrap;
    }
    .topRight{
      margin-left:auto;
      display:flex;
      gap: 8px;
      align-items:center;
      min-width: 0;
    }
    .pill{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      background: var(--btn);
      border: 1px solid var(--btnBorder);
      cursor:pointer;
      user-select:none;
    }
    .pill:hover{ background: var(--btnHover); }
    .pill:active{ transform: translateY(1px); }
    .pill.small{ padding: 5px 7px; font-size: 12px; }
    .pill.ghost{ background: transparent; }
    .pill.bad{ border-color: var(--red); color: var(--red); }
    .pill.ok{ border-color: var(--green); color: var(--green); }
    .pill.info{ border-color: var(--blue); color: var(--blue); }

    .kbd{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      background: var(--panel2);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .input{
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel2);
      padding: 7px 8px;
      outline:none;
      min-width: 0;
    }
    :root[data-theme="light"] .input{ background: var(--panel2); }
    .input:focus{
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .content{
      padding: 12px;
      overflow:auto;
      height:100%;
      background: var(--bg);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: var(--gap);
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: none;
      overflow:hidden;
    }
    .cardHeader{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
    }
    .cardTitle{
      font-weight: 720;
      color: var(--fg2);
      display:flex;
      align-items:center;
      gap: 8px;
      min-width:0;
    }
    .cardTitle small{
      font-weight: 600;
      color: var(--muted);
      font-size: 11px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .cardBody{ padding: 10px 12px; }

    .muted{ color: var(--muted); }
    .mono{ font-family: var(--mono); }
    .small{ font-size: 12px; }
    .right{ text-align:right; }
    .wrap{ overflow-wrap:anywhere; word-break:break-word; white-space:normal; }

    .chipRow{ display:flex; flex-wrap:wrap; gap: 6px; }
    .chip{
      border: 1px solid var(--border);
      background: var(--panel2);
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--fg);
      white-space: nowrap;
    }
    .chip.ok{ border-color: var(--green); color: var(--green); background: rgba(167, 223, 121, 0.1); }
    .chip.warn{ border-color: var(--yellow); color: var(--yellow); background: rgba(229, 192, 123, 0.1); }
    .chip.bad{ border-color: var(--red); color: var(--red); background: rgba(255, 123, 134, 0.1); }
    .chip.info{ border-color: var(--blue); color: var(--blue); background: rgba(97, 175, 239, 0.1); }
    .chip.click{ cursor:pointer; }
    .chip.click:hover{ filter: brightness(1.2); }

    .row{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .row.wsControls{ margin-bottom: 8px; }
    .field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      min-width: 160px;
      flex: 1 1 180px;
    }
    .field label{
      font-size: 11px;
      color: var(--muted);
    }
    select.input{ padding: 6px 8px; }

    /* Tables */
    table{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    th, td{
      padding: 7px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th{
      text-align:left;
      color: var(--muted);
      font-weight: 700;
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    tr:hover td{ background: var(--panel2); cursor:pointer; }
    tr.wsSelected td{ background: var(--sel) !important; }
    .nowrap{ white-space:nowrap; }

    /* Tickets: split */
    .split{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: var(--gap);
      align-items:start;
    }

    /* Board */
    .boardTop{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap:wrap;
    }
    .board{
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow:hidden;
      background: var(--panel);
    }
    .cols{
      display:grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(240px, 1fr);
      gap: 0;
      overflow:auto;
      height: calc(100vh - 240px);
      min-height: 420px;
    }
    .col{
      border-right: 1px solid var(--border);
      display:flex;
      flex-direction:column;
      min-width: 240px;
      background: var(--panel);
    }
    .col:last-child{ border-right:none; }
    .colHeader{
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 2;
    }
    .colHeader .name{
      font-weight: 740;
      color: var(--fg2);
      font-size: 12px;
      max-width: 170px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .colHeader .count{
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }
    .colBody{
      padding: 8px;
      display:flex;
      flex-direction:column;
      gap: 8px;
      overflow:auto;
      height:100%;
    }
    .dropHint{
      border: 1px dashed var(--border2);
      border-radius: var(--r2);
      padding: 8px;
      color: var(--muted);
      font-size: 11px;
      text-align:center;
      display:none;
    }
    .col.dragover .dropHint{ display:block; }
    .cardT{
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: var(--r2);
      padding: 8px;
      cursor: grab;
      user-select:none;
    }
    .cardT:active{ cursor: grabbing; }
    .cardT:hover{ filter: brightness(1.06); }
    .cardT .topLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
    }
    .cardT .id{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .cardT .prio{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .cardT .title{
      margin-top: 6px;
      font-weight: 650;
      color: var(--fg2);
      font-size: 12px;
      line-height: 1.35;
      display:-webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }
    .cardT .meta{
      margin-top: 6px;
      display:flex;
      gap: 6px;
      flex-wrap:wrap;
      color: var(--muted);
      font-size: 11px;
    }

    /* Detail drawer */
    .drawer{
      position: sticky;
      top: 0;
      max-height: calc(100vh - 96px);
      overflow:auto;
    }
    .drawer .head{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
    }
    .drawer .head .h{
      min-width: 0;
    }
    .drawer .head .id{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .drawer .head .title{
      margin-top: 6px;
      font-weight: 760;
      color: var(--fg2);
      font-size: 13px;
      line-height: 1.35;
    }
    .drawer .body{
      padding: 10px 12px 12px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .md{
      font-size: 12px;
      color: var(--fg);
      line-height: 1.55;
      white-space: normal;
    }
    .md p{ margin: 8px 0; color: var(--fg); }
    .md h1,.md h2,.md h3{ margin: 12px 0 6px; color: var(--fg2); }
    .md h1{ font-size: 15px; }
    .md h2{ font-size: 14px; }
    .md h3{ font-size: 13px; }
    .md pre{
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 8px;
      overflow:auto;
    }
    .md code{
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1px 5px;
    }
    .md blockquote{
      margin: 8px 0;
      padding: 8px;
      border-left: 3px solid var(--border2);
      background: var(--panel2);
      border-radius: 8px;
      color: var(--muted);
    }
    .md ul{ margin: 8px 0 8px 18px; }

    .monoBlock{
      font-family: var(--mono);
      font-size: 11px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 8px;
      overflow:auto;
      max-height: 320px;
      white-space: pre;
      color: var(--fg);
    }

    /* Loading */
    .loadingCard{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      display:flex;
      align-items:center;
      gap: 12px;
    }
    .spinner{
      width: 18px; height: 18px;
      border-radius: 999px;
      border: 2px solid var(--border2);
      border-top-color: var(--blue);
      animation: spin .8s linear infinite;
    }
    @keyframes spin{ to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce){ .spinner{ animation:none; } }

    /* Diff accordions (GitHub-ish) */
    .pill.active{ background: var(--sel); border-color: var(--border2); }

    /* Teams: live run UI */
    .tabBar{ display:flex; flex-wrap:wrap; gap: 6px; }
    .tabBar .pill{ border-radius: 999px; }
    .tabBar .pill.active{ background: var(--sel); border-color: var(--border2); }

    .kvGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }
    @media (max-width: 980px){ .kvGrid{ grid-template-columns: 1fr; } }
    .kv{
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: var(--r2);
      padding: 8px;
    }
    .kv .k{ color: var(--muted); font-size: 11px; margin-bottom: 4px; }
    .kv .v{ font-family: var(--mono); font-size: 11px; color: var(--fg); overflow-wrap:anywhere; }

    .callout{
      border: 1px solid var(--border);
      border-left: 3px solid var(--border2);
      background: var(--panel2);
      border-radius: var(--r2);
      padding: 8px 10px;
    }
    .callout.ok{ border-left-color: var(--ok); }
    .callout.warn{ border-left-color: var(--warn); }
    .callout.bad{ border-left-color: var(--bad); }
    .callout .h{ font-weight: 760; color: var(--fg2); font-size: 12px; }
    .callout .d{ margin-top: 4px; color: var(--muted); font-size: 12px; }

    .teamListQ{ margin-bottom: 8px; }
    .teamGrid{ display:grid; gap: 10px; }

    .eventList{ display:flex; flex-direction:column; gap: 6px; }
    details.eventItem{
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: var(--r2);
      overflow:hidden;
    }
    details.eventItem > summary{
      list-style:none;
      padding: 8px 10px;
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:flex-start;
      gap: 10px;
    }
    details.eventItem > summary::-webkit-details-marker{ display:none; }
    .eventDot{ width: 8px; height: 8px; border-radius: 999px; background: var(--muted); margin-top: 5px; flex: 0 0 auto; }
    .eventDot.ok{ background: var(--ok); }
    .eventDot.bad{ background: var(--bad); }
    .eventTop{ display:flex; gap: 8px; align-items:center; min-width:0; }
    .eventType{ font-family: var(--mono); font-size: 11px; color: var(--fg2); }
    .eventTs{ font-family: var(--mono); font-size: 11px; color: var(--muted); white-space:nowrap; }
    .eventSummary{ margin-top: 3px; color: var(--fg); font-size: 12px; overflow-wrap:anywhere; }
    .eventBody{ padding: 8px 10px; border-top: 1px solid var(--border); }

    .msgList{ display:flex; flex-direction:column; gap: 8px; }
    .msgCard{
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: var(--r2);
      padding: 8px 10px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }
    .msgHead{ display:flex; align-items:center; gap: 8px; flex-wrap:wrap; }
    .msgHead .meta{ margin-left:auto; display:flex; gap: 6px; align-items:center; flex-wrap:wrap; }
    .msgBody{ color: var(--fg); font-size: 12px; white-space: pre-wrap; overflow-wrap:anywhere; }
    .msgPreview{ color: var(--fg); font-size: 12px; overflow-wrap:anywhere; }

    .capList{ display:flex; flex-direction:column; gap: 8px; }
    .capCard{
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: var(--r2);
      padding: 8px 10px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }
    .capHead{ display:flex; align-items:center; gap: 8px; flex-wrap:wrap; }
    .capHead .meta{ margin-left:auto; display:flex; gap: 6px; align-items:center; flex-wrap:wrap; }
    .capPath{ font-family: var(--mono); font-size: 11px; color: var(--muted); overflow-wrap:anywhere; }
    .diffMetaRow{ display:flex; flex-wrap:wrap; gap: 6px; align-items:center; }
    .diffAcc{
      border: 1px solid var(--border);
      border-radius: var(--r2);
      background: var(--panel2);
      overflow:hidden;
      margin-bottom: 10px;
    }
    .diffAcc details{ margin:0; }
    .diffAcc summary{
      list-style:none;
      padding: 8px 10px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      gap: 10px;
      cursor:pointer;
      user-select:none;
    }
    .diffAcc summary::-webkit-details-marker{ display:none; }
    .diffAcc summary .path{ font-family: var(--mono); font-size: 11px; color: var(--fg2); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .diffAcc summary .stats{ margin-left:auto; display:flex; gap: 6px; align-items:center; }
    .diffAcc .body{ overflow:auto; }
    .diffTable{
      width:100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.45;
    }
    .diffTable td{
      padding: 0;
      border-bottom: 1px solid rgba(0,0,0,0.0);
      vertical-align: top;
    }
    .diffLn{
      width: 54px;
      text-align: right;
      padding: 2px 8px 2px 6px;
      color: var(--muted);
      user-select:none;
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,0.06);
    }
    :root[data-theme="light"] .diffLn{ background: rgba(0,0,0,0.03); }
    .diffCode{
      padding: 2px 10px;
      white-space: pre;
      overflow-wrap: normal;
    }
    .dr.ctx .diffCode{ background: transparent; }
    .dr.add .diffCode{ background: rgba(167, 223, 121, 0.12); }
    .dr.del .diffCode{ background: rgba(255, 123, 134, 0.12); }
    .dr.hunk .diffCode{ background: rgba(213, 124, 237, 0.12); color: var(--fg2); }
    .dr.meta .diffCode{ background: rgba(86, 182, 194, 0.08); color: var(--muted); }
    .dr.add .diffLn.new{ background: rgba(167, 223, 121, 0.12); color: var(--green); }
    .dr.del .diffLn.old{ background: rgba(255, 123, 134, 0.12); color: var(--red); }
    .dr.hunk .diffLn{ background: rgba(213, 124, 237, 0.10); color: var(--purple); }
    .dr.meta .diffLn{ background: rgba(86, 182, 194, 0.06); }

    .canvasWrap{
      border: 1px solid var(--border);
      border-radius: var(--r2);
      background: var(--panel2);
      overflow:hidden;
      height: 260px;
    }
    canvas{ width:100%; height:100%; display:block; }

    /* Toasts */
    .toasts{
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 9999;
      display:flex;
      flex-direction:column;
      gap: 8px;
      width: min(420px, calc(100vw - 20px));
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border2);
      border-radius: var(--r);
      padding: 8px 10px;
      box-shadow: var(--shadow);
      display:flex;
      gap: 10px;
      align-items:flex-start;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .12s ease, transform .12s ease;
    }
    .toast.show{ opacity: 1; transform: translateY(0); }
    .toast .t{
      display:flex;
      flex-direction:column;
      gap: 4px;
      min-width:0;
    }
    .toast .m{ font-weight: 700; color: var(--fg2); font-size: 12px; }
    .toast .d{ color: var(--muted); font-size: 12px; }
    .toast .x{
      margin-left:auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 6px;
      cursor:pointer;
      user-select:none;
      color: var(--muted);
    }
    .toast .x:hover{ background: var(--panel2); }
    .toast.ok{ border-left-color: var(--ok); }
    .toast.warn{ border-left-color: var(--warn); }
    .toast.bad{ border-left-color: var(--bad); }
    .toast.info{ border-left-color: var(--info); }

    /* Dialog */
    .modal{
      position: fixed;
      inset:0;
      z-index: 9998;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 12px;
      background: rgba(0,0,0,.48);
    }
    :root[data-theme="light"] .modal{ background: rgba(0,0,0,.22); }
    .modal.show{ display:flex; }
    .dialog{
      width: min(920px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow:auto;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .dialogHead{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .dialogHead .h{
      font-weight: 760;
      color: var(--fg2);
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .dialogBody{ padding: 10px 12px; }
    .dialogFoot{
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display:flex;
      justify-content:flex-end;
      gap: 8px;
      flex-wrap:wrap;
    }

    /* Responsive */
    @media (max-width: 980px){
      body{ overflow:auto; }
      .app{ grid-template-columns: 1fr; height:auto; min-height:100%; }
      .side{ position: sticky; top:0; z-index: 2; border-right:none; border-bottom: 1px solid var(--border); }
      .main{ height:auto; }
      .split{ grid-template-columns: 1fr; }
      .cols{ height: auto; min-height: 520px; }
      .drawer{ position: static; max-height: none; }
    }
    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <div class="logo">L</div>
        <div class="brandTitle">
          <div class="t">Loom Console</div>
          <div class="s" id="brandSub">ops dashboard</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a href="#/overview" data-route="overview" class="active"><span>Overview</span><span class="k">g o</span></a>
        <a href="#/tickets" data-route="tickets"><span>Tickets</span><span class="k">g t</span></a>
        <a href="#/teams" data-route="teams"><span>Teams</span><span class="k">g m</span></a>
        <a href="#/memory" data-route="memory"><span>Memory</span><span class="k">g r</span></a>
        <a href="#/workspace" data-route="workspace"><span>Workspace</span><span class="k">g w</span></a>
        <a href="#/compound" data-route="compound"><span>Compound</span><span class="k">g c</span></a>
        <a href="#/settings" data-route="settings"><span>Settings</span><span class="k">g s</span></a>

      <div class="sideFooter">
        <div class="statusRow">

          <span class="mono" id="clock"></span>
        </div>
        <div class="statusRow">
          <span class="muted">base</span>
          <span class="mono" id="baseMini"></span>
        </div>
        <div class="statusRow">
          <span id="writesLine" class="muted">writes: ?</span>
          <span id="authLine" class="muted">auth: ?</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <div class="viewTitle" id="viewTitle">Overview</div>

        <input class="input" id="globalSearch" placeholder="Search tickets (/)…" style="flex: 1 1 420px; max-width: 720px;" />

        <div class="topRight">
          <button class="pill small ghost" id="liveBtn" type="button" title="Toggle live polling (l)">
            <span class="mono">live</span> <span id="liveState" class="mono muted">off</span>
          </button>
          <select class="input" id="liveInterval" title="Live interval" style="width:110px">
            <option value="2000">2s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
          </select>
          <button class="pill small" id="refreshBtn" type="button" title="Refresh (r)">refresh</button>
          <button class="pill small ok" id="createBtn" type="button" title="Create ticket (n)">new</button>
          <button class="pill small ghost" id="helpBtn" type="button" title="Shortcuts (?)">?</button>
        </div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="toasts" id="toasts"></div>

  <div class="modal" id="modal">
    <div class="dialog">
      <div class="dialogHead">
        <div class="h" id="dialogTitle">Dialog</div>
        <button class="pill small" id="dialogClose" type="button">close</button>
      </div>
      <div class="dialogBody" id="dialogBody"></div>
      <div class="dialogFoot" id="dialogFoot"></div>
    </div>
  </div>

<script>
(() => {
  const $ = (s, r=document) => r.querySelector(s);
  const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));

  const STORE = 'loomDash:atomOne:v1';
  const defaults = {
    baseUrl: location.origin,
    authMode: 'none', // none | loom | bearer
    token: '',
    theme: (matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light',

    live: false,
    liveInterval: 5000,

    tickets: {
      view: 'board', // board | list
      include_closed: '0',
      limit: '500',
      status: '',
      type: '',
      assignee: '',
      tag: '',
      prio_min: '',
      prio_max: '',
      clientQ: '',
      bucketMode: 'bucket', // bucket | status
      selectedId: ''
    },

    // Teams UI state (client-only)
    teams: { selected: '', limit: '120', tab: 'overview', q: '', events_q: '', events_ok: 'all', inbox_view: 'unread', captures_q: '' },
    memory: { vault: '.memory', q: '', limit: '10', tag: '', not_tag: '', scope: '', not_scope: '', visibility: '', expand: '0', context:'0', deterministic:'0', include_deprecated:'0' },
    workspace: { mode: 'auto', root: '', q: '', dirty: '', group: '', repo: '', missing: '', selectedPath: '', diffMode: 'cumulative', diffBase: '' },
    compound: { selectedSkill: '' },
    lastRoute: 'overview'
  };

  let state = loadState();

  function loadState(){
    try{
      const raw = localStorage.getItem(STORE);
      if (!raw) return structuredClone(defaults);
      return mergeDeep(structuredClone(defaults), JSON.parse(raw));
    } catch { return structuredClone(defaults); }
  }
  function mergeDeep(a,b){
    if (!a || typeof a !== 'object' || !b || typeof b !== 'object') return b ?? a;
    for (const k of Object.keys(b)){
      if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) a[k] = mergeDeep(a[k] || {}, b[k]);
      else a[k] = b[k];
    }
    return a;
  }
  function save(){
    try{ localStorage.setItem(STORE, JSON.stringify(state)); } catch {}
    $('#baseMini').textContent = normBase(state.baseUrl);
  }
  function normBase(u){
    u = (u || '').trim();
    return u.replace(/\/+$/,'');
  }

  function prettyPath(p){
    p = (p || '').toString();
    if (!p) return '';
    const mac = p.match(/^\/Users\/[^/]+/);
    if (mac) return p.replace(mac[0], '~');
    const nix = p.match(/^\/home\/[^/]+/);
    if (nix) return p.replace(nix[0], '~');
    return p;
  }

  function setTheme(t){
    state.theme = t;
    document.documentElement.setAttribute('data-theme', t);
    save();
  }
  setTheme(state.theme);

  // clock
  function tick(){
    const d = new Date();
    $('#clock').textContent = d.toLocaleTimeString();
  }
  tick(); setInterval(tick, 1000);

  // toasts
  const toasts = $('#toasts');
  function toast(msg, type='info', detail=''){
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `
      <div class="t">
        <div class="m">${escapeHtml(msg)}</div>
        ${detail ? `<div class="d">${escapeHtml(detail)}</div>` : ''}
      </div>
      <button class="x" type="button">x</button>
    `;
    toasts.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    const kill = () => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 140);
    };
    el.querySelector('button.x').addEventListener('click', kill);
    setTimeout(kill, 3200);
  }

  // dialog
  const modal = $('#modal');
  function openDialog({title='Dialog', bodyHTML='', footHTML='' }){
    $('#dialogTitle').textContent = title;
    $('#dialogBody').innerHTML = bodyHTML;
    $('#dialogFoot').innerHTML = footHTML;
    modal.classList.add('show');
  }
  function closeDialog(){ modal.classList.remove('show'); }
  $('#dialogClose').addEventListener('click', closeDialog);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeDialog(); });

  // API
  const connDot = $('#connDot');
  const connText = $('#connText');
  function setConn(ok, label){
    connDot.className = 'dot ' + (ok ? 'ok' : 'bad');
    connText.textContent = label || (ok ? 'connected' : 'disconnected');
  }

  async function api(path, {method='GET', query=null, body=null} = {}){
    const base = normBase(state.baseUrl);
    const url = base + path + (query ? toQuery(query) : '');
    const headers = { 'Accept':'application/json' };
    if (body !== null) headers['Content-Type'] = 'application/json';
    if (state.authMode === 'loom' && state.token) headers['X-Loom-Token'] = state.token;
    if (state.authMode === 'bearer' && state.token) headers['Authorization'] = 'Bearer ' + state.token;

    let res;
    try{
      res = await fetch(url, { method, headers, body: body !== null ? JSON.stringify(body) : undefined });
    } catch (err){
      setConn(false, 'network');
      throw new Error('Network error: ' + (err?.message || String(err)));
    }
    const txt = await res.text();
    let j = null;
    try{ j = txt ? JSON.parse(txt) : null; } catch {
      throw new Error('Bad JSON from server');
    }
    if (!res.ok){
      const msg = j?.error?.message || (res.status + ' ' + res.statusText);
      const code = j?.error?.code || ('HTTP_' + res.status);
      const e = new Error(msg);
      e._loom = { code, status: res.status, details: j?.error?.details || j, url };
      throw e;
    }
    if (j && typeof j.ok === 'boolean'){
      if (!j.ok){
        const e = new Error(j?.error?.message || 'Request failed');
        e._loom = { code: j?.error?.code || 'ERROR', details: j?.error?.details || {}, url };
        throw e;
      }
      return j.data;
    }
    return j;
  }

  function escapeHtml(s){
    return (s ?? '').toString()
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'","&#039;");
  }
  function toQuery(params){
    const sp = new URLSearchParams();
    for (const [k,v] of Object.entries(params || {})){
      if (v === undefined || v === null || v === '') continue;
      if (Array.isArray(v)){
        v.forEach(it => { const t = (it ?? '').toString().trim(); if (t) sp.append(k, t); });
      } else sp.set(k, (v ?? '').toString());
    }
    const qs = sp.toString();
    return qs ? ('?' + qs) : '';
  }

  // lightweight markdown: safe-ish, minimal
  function mdToHtml(src){
    src = (src ?? '').toString();
    if (!src.trim()) return '<div class="muted">No content.</div>';
    const lines = src.replaceAll('\r','').split('\n');
    let out = '';
    let inCode = false;
    let code = [];
    let list = [];

    const flushList = () => {
      if (!list.length) return;
      out += '<ul>' + list.map(x => `<li>${inline(x)}</li>`).join('') + '</ul>';
      list = [];
    };
    const flushCode = () => {
      if (!inCode) return;
      out += `<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`;
      inCode = false; code = [];
    };

    for (const raw of lines){
      const line = raw ?? '';
      if (line.trim().startsWith('```')){
        if (inCode) flushCode();
        else { flushList(); inCode = true; code = []; }
        continue;
      }
      if (inCode){ code.push(line); continue; }

      const h1 = line.match(/^#\s+(.*)$/);
      const h2 = line.match(/^##\s+(.*)$/);
      const h3 = line.match(/^###\s+(.*)$/);
      const bq = line.match(/^>\s?(.*)$/);
      const li = line.match(/^\s*[-*]\s+(.*)$/);

      if (h1){ flushList(); out += `<h1>${inline(h1[1])}</h1>`; continue; }
      if (h2){ flushList(); out += `<h2>${inline(h2[1])}</h2>`; continue; }
      if (h3){ flushList(); out += `<h3>${inline(h3[1])}</h3>`; continue; }
      if (bq){ flushList(); out += `<blockquote>${inline(bq[1])}</blockquote>`; continue; }
      if (li){ list.push(li[1]); continue; }

      if (!line.trim()){ flushList(); out += '<div style="height:6px"></div>'; continue; }
      flushList();
      out += `<p>${inline(line)}</p>`;
    }
    flushList(); flushCode();
    return out;

    function inline(s){
      s = escapeHtml(s);
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url) => `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(txt)}</a>`);
      s = s.replace(/`([^`]+)`/g, (m, code) => `<code>${escapeHtml(code)}</code>`);
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      return s;
    }
  }

  // Data cache
  const data = {
    health: null,
    caps: null,
    tickets: { list: null, count: 0, at: 0 },
    ticket: { id: '', show: null, view: null, dep: null },
    teams: { list: null, at: 0, bundle: null },
    memory: { results: null, note: null },
    workspace: { meta:null, worktrees:null, services:null, diff:null, diffAt:0, diffKey:'', diffLoading:false },
    compound: { skills:null, skill:null, instincts:null }
  };

  async function loadHealthCaps(force=false){
    const fresh = (Date.now() - (data._hcAt || 0)) < 8000;
    if (!force && data.health && data.caps && fresh) return;
    try{
      const [h, c] = await Promise.all([
        api('/api/v1/health'),
        api('/api/v1/capabilities')
      ]);
      data.health = h; data.caps = c; data._hcAt = Date.now();
      setConn(true);
      setBadges();
      $('#brandSub').textContent = (h.workspace_mode || 'workspace') + ' · ' + (h.writes_enabled ? 'writes' : 'read-only');
    } catch (err){
      setConn(false, 'api');
      toast('Health failed', 'bad', err.message || String(err));
    }
  }

  function setBadges(){
    const h = data.health;
    if (!h){
      $('#writesLine').textContent = 'writes: ?';
      $('#authLine').textContent = 'auth: ?';
      return;
    }
    $('#writesLine').textContent = 'writes: ' + (h.writes_enabled ? 'enabled' : 'disabled');
    const req = !!h.token_required;
    const mode = state.authMode === 'loom' ? 'X-Loom-Token' : (state.authMode === 'bearer' ? 'Bearer' : 'none');
    $('#authLine').textContent = (req ? 'auth: token' : 'auth: open') + ' · ' + mode;
  }

  // Routing
  const routes = {
    overview: { title: 'Overview', render: renderOverview, bind: bindOverview },
    tickets: { title: 'Tickets', render: renderTickets, bind: bindTickets },
    teams: { title: 'Teams', render: renderTeams, bind: bindTeams },
    memory: { title: 'Memory', render: renderMemory, bind: bindMemory },
    workspace: { title: 'Workspace', render: renderWorkspace, bind: bindWorkspace },
    compound: { title: 'Compound', render: renderCompound, bind: bindCompound },
    settings: { title: 'Settings', render: renderSettings, bind: bindSettings }
  };

  function routeFromHash(){
    const h = (location.hash || '#/overview').replace('#/','');
    const r = (h.split('?')[0] || 'overview').trim();
    return routes[r] ? r : 'overview';
  }
  function goto(r){ location.hash = '#/' + r; }

  function setNavActive(route){
    $$('#nav a').forEach(a => a.classList.toggle('active', a.getAttribute('data-route') === route));
  }

  const content = $('#content');
  let scrollPos = {};

  async function renderRoute(){
    const route = routeFromHash();
    state.lastRoute = route;
    save();

    $('#viewTitle').textContent = routes[route].title;
    setNavActive(route);

    // Immediate loading indicator (prevents “blank” feel on slow routes)
    content.innerHTML = `
      <div class="loadingCard">
        <div class="spinner"></div>
        <div>
          <div style="font-weight:760; color:var(--fg2)">Loading ${escapeHtml(routes[route].title)}…</div>
          <div class="muted small">Fetching data from Loom API.</div>
        </div>
      </div>
    `;
    await new Promise(r => requestAnimationFrame(() => r()));

    // Save scroll state for current view components before re-render
    $$('.cols, .drawer, .content').forEach(el => {
      if (el.scrollTop > 0) scrollPos[el.className] = el.scrollTop;
    });

    await loadHealthCaps(false);

    if (route === 'tickets') await loadTickets(false);
    if (route === 'teams') await loadTeams(false);
    if (route === 'memory' && !data.memory.results) await loadMemoryRecall(false);
    if (route === 'workspace') await loadWorkspace(false);
    if (route === 'compound') await loadCompound(false);

    content.innerHTML = await routes[route].render();
    routes[route].bind();

    // Restore scroll state
    requestAnimationFrame(() => {
      Object.entries(scrollPos).forEach(([cls, top]) => {
        const el = content.querySelector('.' + cls.split(' ').join('.'));
        if (el) el.scrollTop = top;
      });
    });
  }

  window.addEventListener('hashchange', renderRoute);

  // Overview
  async function renderOverview(){
    const h = data.health;
    const c = data.caps;
    if (!h || !c){
      return `<div class="card"><div class="cardHeader"><div class="cardTitle">Loading</div></div><div class="cardBody" class="muted">Fetching health…</div></div>`;
    }

    // cheap nudge: stale + blocked snapshot from open tickets (best effort)
    let nudges = { blocked: 0, stale: 0, staleList: [] };
    if (data.tickets.list && data.tickets.list.length){
      const now = Date.now();
      for (const t of data.tickets.list){
        const s = (t.status || '').toLowerCase();
        if (s.includes('block')) nudges.blocked++;
        const mt = parseTime(t.mtime);
        if (mt && (now - mt) > 7*24*3600*1000){
          nudges.stale++;
          if (nudges.staleList.length < 5) nudges.staleList.push(t);
        }
      }
    }

    return `
      <div class="grid">
        <div class="card" style="grid-column: span 6;">
          <div class="cardHeader">
            <div class="cardTitle">Server <small>/api/v1/health</small></div>
            <div class="row">
              <button class="pill small" id="healthJson" type="button">json</button>
            </div>
          </div>
          <div class="cardBody">
            <div class="row">
              <div class="field" style="min-width:220px">
                <label>platform</label>
                <div class="mono">${escapeHtml(h.platform || '')}</div>
              </div>
              <div class="field" style="min-width:220px">
                <label>python</label>
                <div class="mono">${escapeHtml(h.python || '')}</div>
              </div>
              <div class="field" style="min-width:220px">
                <label>workspace</label>
                <div class="mono">${escapeHtml(h.workspace_mode || '')}</div>
              </div>
            </div>
            <div class="row">
              <div class="field" style="min-width:220px">
                <label>root</label>
                <div class="mono muted wrap">${escapeHtml(prettyPath(h.workspace_root || h.repo_root || ''))}</div>
              </div>
              <div class="field" style="min-width:220px">
                <label>writes</label>
                <div class="mono" style="color:${h.writes_enabled ? 'var(--green)' : 'var(--red)'}">${h.writes_enabled ? 'enabled' : 'disabled'}</div>
              </div>
              <div class="field" style="min-width:220px">
                <label>token_required</label>
                <div class="mono">${h.token_required ? 'true' : 'false'}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card" style="grid-column: span 6;">
          <div class="cardHeader">
            <div class="cardTitle">Capabilities <small>/api/v1/capabilities</small></div>
            <div class="row">

  // Tickets
  function ticketQueryFromState(){
    const t = state.tickets;
    return {
      status: t.status,
      type: t.type,
      assignee: t.assignee,
      tag: t.tag,
      prio_min: t.prio_min,
      prio_max: t.prio_max,
      include_closed: t.include_closed || '0',
      limit: t.limit || '500'
    };
  }

  async function loadTickets(force=false){
    await loadHealthCaps(false);
    const age = Date.now() - data.tickets.at;
    if (!force && data.tickets.list && age < 6000) return;
    try{
      const res = await api('/api/v1/tickets', { query: ticketQueryFromState() });
      data.tickets.list = res.tickets || [];
      data.tickets.count = res.count || data.tickets.list.length;
      data.tickets.at = Date.now();
    } catch (err){
      toast('Tickets failed', 'bad', err.message || String(err));
    }
  }

  async function loadTicketDetails(id, force=false){
    if (!id) return;
    if (!force && data.ticket.id === id && data.ticket.show && data.ticket.view) return;
    try{
      const [show, view] = await Promise.all([
        api(`/api/v1/tickets/${encodeURIComponent(id)}`),
        api(`/api/v1/tickets/${encodeURIComponent(id)}/view`)
      ]);
      data.ticket = { id, show, view, dep: null };
    } catch (err){
      toast('Ticket detail failed', 'bad', err.message || String(err));
    }
  }

  function clamp(s, n){
    s = (s ?? '').toString();
    return s.length <= n ? s : (s.slice(0, n-1) + '…');
  }

  function parseTime(s){
    if (!s) return null;
    const d = new Date(s);
    if (!isFinite(d.getTime())) return null;
    return d.getTime();
  }

  function statusBucket(status){
    const s = (status || '').toLowerCase();
    if (/(done|closed|resolved|merged)/.test(s)) return 'done';
    if (/block/.test(s)) return 'blocked';
    if (/(progress|doing|wip)/.test(s)) return 'in_progress';
    if (/review/.test(s)) return 'review';
    if (/ready/.test(s)) return 'ready';
    return 'backlog';
  }
  function statusForBucket(bucket){
    if (bucket === 'backlog') return 'open';
    if (bucket === 'done') return 'closed';
    if (bucket === 'ready') return 'ready';
    if (bucket === 'in_progress') return 'in_progress';
    if (bucket === 'blocked') return 'blocked';
    if (bucket === 'review') return 'review';
    return bucket;
  }
  const BUCKET_ORDER = ['backlog','ready','in_progress','blocked','review','done'];
  const BUCKET_LABEL = {
    backlog: 'Backlog',
    ready: 'Ready',
    in_progress: 'In progress',
    blocked: 'Blocked',
    review: 'Review',
    done: 'Closed'
  };

  function ticketMatchesClientQ(t, q){
    q = (q || '').trim().toLowerCase();
    if (!q) return true;
    const hay = `${t.id} ${t.title} ${t.status} ${t.assignee} ${(t.tags||[]).join(' ')} ${(t.claimed_by||'')}`.toLowerCase();
    return hay.includes(q);
  }

  async function renderTickets(){
    const tstate = state.tickets;
    const list = data.tickets.list || [];
    const q = (tstate.clientQ || '').trim();
    const gq = ($('#globalSearch')?.value || '').trim();
    const effectiveQ = gq || q;

    const filtered = list.filter(t => ticketMatchesClientQ(t, effectiveQ));

    // build columns
    let cols = [];
    let groups = new Map();

    if (tstate.bucketMode === 'status'){
      const counts = new Map();
      for (const t of filtered){
        const s = t.status || 'unknown';
        counts.set(s, (counts.get(s)||0) + 1);
      }
      cols = Array.from(counts.entries()).sort((a,b)=>b[1]-a[1]).map(([s]) => s);
      // keep sane: cap at 12 columns, lump rest into "other"
      const cap = 12;
      const keep = cols.slice(0, cap);
      const rest = cols.slice(cap);
      cols = rest.length ? [...keep, '__other__'] : keep;

      for (const c of cols) groups.set(c, []);
      for (const t of filtered){
        const s = t.status || 'unknown';
        const k = cols.includes(s) ? s : '__other__';
        groups.get(k).push(t);
      }
    } else {
      cols = BUCKET_ORDER.slice();
      cols.forEach(c => groups.set(c, []));
      for (const t of filtered){
        const b = statusBucket(t.status);
        groups.get(b).push(t);
      }
    }

    // sort cards: prio asc then mtime desc
    for (const [k, arr] of groups.entries()){
      arr.sort((a,b) => {
        const pa = (a.priority ?? 999);
        const pb = (b.priority ?? 999);
        if (pa !== pb) return pa - pb;
        const ta = parseTime(a.mtime) || 0;
        const tb = parseTime(b.mtime) || 0;
        return tb - ta;
      });
    }

    // load selected detail if needed
    const sel = tstate.selectedId;
    if (sel && data.ticket.id !== sel) await loadTicketDetails(sel, false);

    const detail = renderTicketDrawer(sel);

    return `
      <div class="split">
        <div class="card">
          <div class="cardHeader">
            <div class="cardTitle">Tickets <small>/api/v1/tickets · ${filtered.length}/${data.tickets.count}</small></div>
            <div class="row">
              <button class="pill small" id="toggleView" type="button">${tstate.view === 'board' ? 'list' : 'board'}</button>
              <select class="input" id="bucketMode" style="width:150px">
                <option value="bucket" ${tstate.bucketMode==='bucket'?'selected':''}>smart buckets</option>
                <option value="status" ${tstate.bucketMode==='status'?'selected':''}>status columns</option>
              </select>
              <button class="pill small" id="ticketsJson" type="button">json</button>
            </div>
          </div>

          <div class="cardBody">
            <div class="boardTop">
              <input class="input" id="ticketClientQ" placeholder="filter (local)..." value="${escapeHtml(tstate.clientQ)}" style="flex: 1 1 260px;"/>
              <select class="input" id="includeClosed" style="width:150px">
                <option value="0" ${tstate.include_closed==='0'?'selected':''}>open only</option>
                <option value="1" ${tstate.include_closed==='1'?'selected':''}>include closed</option>
              </select>
              <button class="pill small" id="filtersBtn" type="button">filters</button>
              <span class="chip">live: ${state.live ? 'on' : 'off'}</span>
              <span class="chip">mode: ${escapeHtml(tstate.view)}</span>
            </div>

            <div style="height:10px"></div>

            ${tstate.view === 'board' ? `
              <div class="board" id="board">
                <div class="cols" id="cols">
                  ${cols.map(col => {
                    const arr = groups.get(col) || [];
                    const name = (tstate.bucketMode === 'status')
                      ? (col === '__other__' ? 'Other' : col)
                      : (BUCKET_LABEL[col] || col);
                    return `
                      <div class="col" data-col="${escapeHtml(col)}">
                        <div class="colHeader">
                          <div class="name">${escapeHtml(name)}</div>
                          <div class="count">${arr.length}</div>
                        </div>
                        <div class="colBody">
                          <div class="dropHint">drop to set status</div>
                          ${arr.map(t => renderTicketCard(t)).join('')}
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : `
              <table id="ticketTable">
                <thead><tr>
                  <th style="width:120px">id</th>
                  <th>title</th>
                  <th style="width:140px">status</th>
                  <th style="width:70px">prio</th>
                  <th style="width:140px">assignee</th>
                  <th style="width:180px">mtime</th>
                </tr></thead>
                <tbody>
                  ${filtered.map(t => `
                    <tr data-open="${escapeHtml(t.id)}">
                      <td class="mono" style="color:var(--purple)">${escapeHtml(t.id)}</td>
                      <td><span style="color:var(--fg2)">${escapeHtml(clamp(t.title, 110))}</span><div class="muted small mono">${escapeHtml((t.tags||[]).join(', '))}</div></td>
                      <td class="mono" style="color:var(--green)">${escapeHtml(t.status || '')}</td>
                      <td class="right mono" style="color:var(--orange)">${escapeHtml(String(t.priority ?? ''))}</td>
                      <td style="color:var(--blue)">${escapeHtml(t.assignee || '')}</td>
                      <td class="mono muted">${escapeHtml(t.mtime || '')}</td>
                    </tr>
                  `).join('') || `<tr><td colspan="6" class="muted">No tickets.</td></tr>`}
                </tbody>
              </table>
            `}
          </div>
        </div>

        ${detail}
      </div>
    `;
  }

  function renderTicketCard(t){
    const tags = (t.tags || []).slice(0, 4);
    return `
      <div class="cardT" draggable="true" data-id="${escapeHtml(t.id)}">
        <div class="topLine">
          <div class="id" style="color:var(--purple)">${escapeHtml(t.id)}</div>

  function renderTicketDrawer(selId){
    if (!selId){
      return `
        <div class="card drawer">
          <div class="head">

            </div>
          </div>
        </div>
      `;

    const show = data.ticket.show;

        <div class="card drawer">

          <div class="body"><div class="muted">Fetching show/view…</div></div>
        </div>
      `;
    }

    const ticket = show.ticket || {};
    const rel = show.relationships || {};
    const health = view.health || {};
    const graph = view.graph || { nodes:[], edges:[] };

    const chips = [

    const depChips = (ticket.deps || []).slice(0, 16).map(x => `<span class="chip click" data-open="${escapeHtml(x)}">${escapeHtml(x)}</span>`).join('');
    const blockChips = (rel.blockers || []).slice(0, 16).map(x => `<span class="chip bad click" data-open="${escapeHtml(x)}">${escapeHtml(x)}</span>`).join('');
    const linkedChips = (rel.linked || []).slice(0, 16).map(x => `<span class="chip click" data-open="${escapeHtml(x)}">${escapeHtml(x)}</span>`).join('');

    return `
      <div class="card drawer" id="drawer">

            <button class="pill small" id="copyId" type="button">copy</button>
            <button class="pill small" id="editTicket" type="button">edit</button>
            <button class="pill small" id="ticketJson" type="button">json</button>
          </div>
        </div>

        <div class="body">
          <div class="chipRow">${chips}${(ticket.tags||[]).slice(0,8).map(x => `<span class="chip">#${escapeHtml(x)}</span>`).join('')}</div>

          <div class="card" style="background:transparent; border:none">
            <div class="cardTitle" style="margin: 6px 0 4px;">Health <small>ready=${health.ready ?? '?'} · blocked=${health.blocked ?? '?'}</small></div>
            <div class="chipRow">
              ${Object.entries(health.counts || {}).slice(0,12).map(([k,v]) => `<span class="chip">${escapeHtml(k)}:${escapeHtml(String(v))}</span>`).join('')}
              ${health.bottlenecks?.length ? `<span class="chip warn">bottlenecks:${health.bottlenecks.length}</span>` : ''}
            </div>
          </div>

          <div class="card" style="background:transparent; border:none">

            <div class="chipRow">
              ${depChips || `<span class="muted small">deps: none</span>`}
            </div>
            <div style="height:6px"></div>
            <div class="chipRow">
              ${blockChips || `<span class="muted small">blockers: none</span>`}
            </div>
            <div style="height:6px"></div>
            <div class="chipRow">
              ${linkedChips || `<span class="muted small">linked: none</span>`}
            </div>
          </div>

          <div class="card" style="background:transparent; border:none">
            <div class="cardTitle" style="margin: 6px 0 4px;">Body</div>
            <div class="md">${mdToHtml(show.body || '')}</div>

          <div class="card" style="background:transparent; border:none">

            <div class="canvasWrap"><canvas id="graphCanvas"></canvas></div>

  function bindTickets(){
    // global search wires to tickets local filter for speed
    const gs = $('#globalSearch');
    if (gs){
      const currentQ = state.tickets.clientQ || '';
      if (gs.value !== currentQ) gs.value = currentQ;
      if (!gs.placeholder.includes('(/)')) gs.placeholder = "Search tickets (/)…";
    }

    $('#toggleView')?.addEventListener('click', async () => {
      state.tickets.view = (state.tickets.view === 'board') ? 'list' : 'board';
      save();
      await renderRoute();
    });

    $('#bucketMode')?.addEventListener('change', async (e) => {
      state.tickets.bucketMode = e.target.value;
      save();
      await renderRoute();
    });

    $('#includeClosed')?.addEventListener('change', async (e) => {
      state.tickets.include_closed = e.target.value;
      save();
      await loadTickets(true);
      await renderRoute();

        await loadTicketDetails(id, true);

      footHTML: `<button class="pill small" type="button" id="closeTD">close</button>`
    }) || $('#closeTD')?.addEventListener('click', closeDialog));

        e.stopPropagation();
        const id = ch.getAttribute('data-open');
        state.tickets.selectedId = id;
        save();
        await loadTicketDetails(id, true);
        await renderRoute();
      });
    });

    // drag/drop
    bindBoardDnD();

    // graph draw
    const canvas = $('#graphCanvas');
    if (canvas && data.ticket.view){
      const nodes = data.ticket.view.graph?.nodes || [];
      const edges = data.ticket.view.graph?.edges || [];
      drawGraph(canvas, nodes, edges);
      window.addEventListener('resize', () => drawGraph(canvas, nodes, edges), { passive:true });

    });

  function bindBoardDnD(){
    const cards = $$('.cardT');
    const cols = $$('.col');

    cards.forEach(c => {
      c.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', c.getAttribute('data-id'));
        e.dataTransfer.effectAllowed = 'move';
      });
    });

    cols.forEach(col => {
      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        col.classList.add('dragover');
        e.dataTransfer.dropEffect = 'move';
      });
      col.addEventListener('dragleave', () => col.classList.remove('dragover'));
      col.addEventListener('drop', async (e) => {
        e.preventDefault();
        col.classList.remove('dragover');
        const id = e.dataTransfer.getData('text/plain');
        const targetCol = col.getAttribute('data-col');
        if (!id || !targetCol) return;

        const writesEnabled = !!data.health?.writes_enabled;
        if (!writesEnabled){
          toast('Writes disabled', 'warn', 'Cannot update status.');
          return;
        }

        // Determine new status based on column mode
        let newStatus = null;
        if (state.tickets.bucketMode === 'status'){
          if (targetCol === '__other__'){
            toast('Other column', 'warn', 'Choose a concrete status column.');
            return;
          }
          newStatus = targetCol;
        } else {
          // smart bucket: map to canonical status
          newStatus = statusForBucket(targetCol);
        }

        // Optimistic update in local list
        const t = (data.tickets.list || []).find(x => x.id === id);
        const old = t ? t.status : null;
        if (t) t.status = newStatus;

        try{
          await api(`/api/v1/tickets/${encodeURIComponent(id)}`, { method:'PATCH', body: { status: newStatus } });
          toast('Status updated', 'ok', `${id} → ${newStatus}`);
          // refresh in background for truth
          data.tickets.at = 0;
          await loadTickets(true);
          await renderRoute();
        } catch (err){
          // rollback
          if (t) t.status = old;
          toast('Update failed', 'bad', err.message || String(err));
          await renderRoute();
        }
      });
    });
  }

  function drawGraph(canvas, nodes, edges){
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth || 640;
    const h = canvas.clientHeight || 260;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);

    ctx.clearRect(0,0,w,h);

    if (!nodes || !nodes.length){
      ctx.fillStyle = getCSS('--muted');
      ctx.font = `12px ${getCSS('--mono')}`;
      ctx.fillText('No graph', 10, 18);
      return;
    }

    // simple circular layout
    const cx = w/2, cy = h/2;
    const r = Math.min(w,h) * 0.33;
    const pos = {};
    const N = nodes.length;
    nodes.forEach((id, i) => {
      const a = (Math.PI * 2 * i) / N - Math.PI/2;
      pos[id] = { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    });

    const edgeColor = (kind) => {
      const k = (kind || '').toLowerCase();
      if (k.includes('block')) return getCSS('--red');
      if (k.includes('dep')) return getCSS('--blue');
      return getCSS('--border2');
    };

    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.95;
    (edges || []).forEach(e => {
      const a = pos[e.src], b = pos[e.dst];
      if (!a || !b) return;
      ctx.strokeStyle = edgeColor(e.kind);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    });

    ctx.globalAlpha = 1;
    const fill = getCSS('--panel');
    const stroke = getCSS('--border2');
    const text = getCSS('--fg');
    ctx.font = `11px ${getCSS('--mono')}`;
    nodes.forEach(id => {
      const p = pos[id];
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = text;
      const label = String(id).length > 10 ? String(id).slice(0,9)+'…' : String(id);
      ctx.fillText(label, p.x + 14, p.y + 4);
    });
  }

  // Memory
  async function loadMemoryRecall(force=false){
    try{
      const m = state.memory;
      const wantsContext = (m.context || '0') === '1';
      const contextHasInput = !!(String(m.q || '').trim() || splitCSV(m.tag).length || splitCSV(m.scope).length);
      if (wantsContext && !contextHasInput){
        state.memory.context = '0';
        save();
        toast('Context needs a query', 'warn', 'Add query/tag/scope or disable context.');
      }
      const useContext = (state.memory.context || '0') === '1';
      const query = {
        vault: m.vault || '.memory',
        q: m.q || '',
        limit: m.limit || '10',
        tag: splitCSV(m.tag),
        not_tag: splitCSV(m.not_tag),
        scope: splitCSV(m.scope),
        not_scope: splitCSV(m.not_scope),
        visibility: splitCSV(m.visibility),
        expand: m.expand || '0',
        context: useContext ? '1' : '0',
        deterministic: m.deterministic || '0',
        include_deprecated: m.include_deprecated || '0',
        format: useContext ? 'md' : 'json'
      };
      const res = await api('/api/v1/memory/recall', { query });
      data.memory.results = res;
    } catch (err){
      toast('Recall failed','bad', err.message || String(err));
    }
  }
  async function loadMemoryNote(id){
    if (!id) return;
    try{
      const res = await api(`/api/v1/memory/notes/${encodeURIComponent(id)}`, { query: { vault: state.memory.vault || '.memory' } });
      data.memory.note = res;
    } catch (err){
      toast('Note failed','bad', err.message || String(err));
    }
  }
  function splitCSV(s){
    s = (s ?? '').toString().trim();
    if (!s) return [];
    return s.split(',').map(x => x.trim()).filter(Boolean);
  }

  async function loadWorktreeDiff(force=false){
    const sel = (state.workspace.selectedPath || '').trim();
    if (!sel){
      data.workspace.diff = null;
      data.workspace.diffKey = '';
      data.workspace.diffLoading = false;
      return;
    }
    const w = state.workspace;
    const mode = (w.diffMode || 'cumulative').trim() || 'cumulative';
    const base = (mode === 'cumulative') ? ((w.diffBase || '').trim()) : '';
    const key = [sel, mode, base].join('|');
    const fresh = (Date.now() - (data.workspace.diffAt || 0)) < 8000;
    if (!force && data.workspace.diff && data.workspace.diffKey === key && fresh) return;
    data.workspace.diffLoading = true;
    data.workspace.diffKey = key;
    updateWorkspaceDiffHeader();
    updateWorkspaceDiffPane();
    try{
      const res = await api('/api/v1/workspace/worktree/diff', { query: {
        mode: w.mode || 'auto',
        ...(w.root ? { root: w.root } : {}),
        path: sel,
        diff_mode: mode,
        ...(base ? { base } : {})
      }});
      data.workspace.diff = res;
      data.workspace.diffAt = Date.now();
    } catch (err){
      data.workspace.diff = null;
      toast('Diff failed','bad', err.message || String(err));
    } finally {
      data.workspace.diffLoading = false;
      updateWorkspaceDiffHeader();
      updateWorkspaceDiffPane();
    }
  }

  function parseUnifiedDiffToRows(patch){
    const rows = [];
    const lines = (patch ?? '').toString().replaceAll('\r','').split('\n');
    let oldNo = null;
    let newNo = null;

    for (const ln of lines){
      if (ln.startsWith('diff --git ') || ln.startsWith('index ') || ln.startsWith('new file') || ln.startsWith('deleted file') || ln.startsWith('similarity index') || ln.startsWith('rename ')){
        rows.push({ t:'meta', o:'', n:'', s: ln });
        continue;
      }
      if (ln.startsWith('--- ') || ln.startsWith('+++ ')){
        rows.push({ t:'meta', o:'', n:'', s: ln });
        continue;
      }
      if (ln.startsWith('@@')){
        const m = ln.match(/^@@\s+-(\d+)(?:,(\d+))?\s+\+(\d+)(?:,(\d+))?\s+@@/);
        if (m){
          oldNo = parseInt(m[1], 10);
          newNo = parseInt(m[3], 10);
        } else {
          oldNo = null; newNo = null;
        }
        rows.push({ t:'hunk', o:'', n:'', s: ln });
        continue;
      }
      if (ln.startsWith('+')){
        rows.push({ t:'add', o:'', n: (newNo ?? ''), s: ln });
        if (typeof newNo === 'number') newNo++;
        continue;
      }
      if (ln.startsWith('-')){
        rows.push({ t:'del', o: (oldNo ?? ''), n:'', s: ln });
        if (typeof oldNo === 'number') oldNo++;
        continue;
      }
      if (ln.startsWith(' ')){
        rows.push({ t:'ctx', o: (oldNo ?? ''), n: (newNo ?? ''), s: ln });
        if (typeof oldNo === 'number') oldNo++;
        if (typeof newNo === 'number') newNo++;
        continue;
      }
      if (!ln){
        rows.push({ t:'ctx', o:'', n:'', s: '' });
        continue;
      }
      rows.push({ t:'ctx', o:'', n:'', s: ln });
    }
    return rows;
  }

  function renderUnifiedDiffTable(patch){
    const rows = parseUnifiedDiffToRows(patch);
    return `
      <table class="diffTable">
        <tbody>
          ${rows.map(r => {
            const t = r.t || 'ctx';
            const cls = (t === 'add') ? 'add' : (t === 'del') ? 'del' : (t === 'hunk') ? 'hunk' : (t === 'meta') ? 'meta' : 'ctx';
            const o = (r.o === null || r.o === undefined) ? '' : String(r.o);
            const n = (r.n === null || r.n === undefined) ? '' : String(r.n);
            return `
              <tr class="dr ${cls}">
                <td class="diffLn old">${escapeHtml(o)}</td>
                <td class="diffLn new">${escapeHtml(n)}</td>
                <td class="diffCode">${escapeHtml((r.s ?? '').toString())}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }
