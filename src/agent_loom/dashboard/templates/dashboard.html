              <div class="field" style="flex:2 1 420px">
                <label>base url</label>
                <input class="input" id="baseUrl" value="${escapeHtml(normBase(state.baseUrl))}" placeholder="http://127.0.0.1:8764"/>
                <div class="muted small">Use same-origin if possible. Otherwise you need CORS or a proxy.</div>
              </div>
            </div>

            <div class="row">
              <div class="field" style="min-width:220px">
                <label>auth mode</label>
                <select class="input" id="authMode">
                  <option value="none" ${state.authMode==='none'?'selected':''}>none</option>
                  <option value="loom" ${state.authMode==='loom'?'selected':''}>X-Loom-Token</option>
                  <option value="bearer" ${state.authMode==='bearer'?'selected':''}>Bearer</option>
                </select>
              </div>
              <div class="field" style="flex:2 1 420px">
                <label>token</label>
                <input class="input" id="token" value="${escapeHtml(state.token)}" placeholder="paste token..."/>
                <div class="muted small">Writes require token when token_required=true.</div>
              </div>
            </div>

            <div class="row">
              <div class="field" style="min-width:200px">
                <label>theme</label>
                <select class="input" id="themeSel">
                  <option value="dark" ${state.theme==='dark'?'selected':''}>dark</option>
                  <option value="light" ${state.theme==='light'?'selected':''}>light</option>
                </select>
              </div>
              <div class="field" style="flex:0 0 auto; min-width:160px">
                <label>&nbsp;</label>
                <button class="pill small ok" id="saveSettings" type="button">save</button>
              </div>
            </div>

            <div style="height:10px"></div>
            <div class="chipRow">
              <span class="chip">${h?.workspace_mode ? escapeHtml(h.workspace_mode) : 'workspace'}</span>
              <span class="chip ${h?.writes_enabled ? 'ok' : 'warn'}">writes: ${h?.writes_enabled ? 'enabled' : 'disabled'}</span>
              <span class="chip ${h?.token_required ? 'warn' : 'ok'}">token_required: ${h?.token_required ? 'true' : 'false'}</span>
            </div>
          </div>
        </div>

        <div class="card" style="grid-column: span 5;">
          <div class="cardHeader">
            <div class="cardTitle">About <small>zen, not shiny</small></div>
          </div>
          <div class="cardBody">
            <div class="muted small">
              This UI intentionally avoids gradients, oversized controls, and internal endpoints.
              It’s built for the person running agents and wanting visibility without ceremony.
              <ul>
                <li>Kanban board with drag-to-update status</li>
                <li>Live polling for “realtime” (toggle in top bar)</li>
                <li>Nudge panel for stale/blocked signal</li>
              </ul>
            </div>
            <div class="chipRow">
              <span class="chip">shortcuts: <span class="mono">g</span> + <span class="mono">t</span> tickets</span>
              <span class="chip"><span class="mono">/</span> search</span>
              <span class="chip"><span class="mono">l</span> live</span>
              <span class="chip"><span class="mono">n</span> new</span>
              <span class="chip"><span class="mono">r</span> refresh</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function bindSettings(){
    $('#saveSettings')?.addEventListener('click', async () => {
      state.baseUrl = normBase($('#baseUrl')?.value || location.origin);
      state.authMode = $('#authMode')?.value || 'none';
      state.token = ($('#token')?.value || '').trim();
      setTheme($('#themeSel')?.value || 'dark');
      save();
      await loadHealthCaps(true);
      toast('Saved','ok');
      await renderRoute();
    });

    $('#testBtn')?.addEventListener('click', async () => {
      await loadHealthCaps(true);
      toast('Tested','ok', normBase(state.baseUrl));
      await renderRoute();
    });

    $('#resetBtn')?.addEventListener('click', async () => {
      state = structuredClone(defaults);
      save();
      setTheme(state.theme);
      toast('Reset','ok');
      await loadHealthCaps(true);
      goto('overview');
      await renderRoute();
    });
  }

  // Create ticket
  function openCreateTicketDialog(){
    const writesEnabled = !!data.health?.writes_enabled;
    if (!writesEnabled){
      toast('Writes disabled','warn','Enable writes to create tickets.');
      return;
    }
    openDialog({
      title: 'New ticket',
      bodyHTML: `
        <form id="createForm">
          <div class="row">
            <div class="field" style="flex:2 1 420px">
              <label>title *</label>
              <input class="input" name="title" placeholder="Ship agent dashboard" required/>
            </div>
            <div class="field" style="min-width:180px">
              <label>type</label>
              <input class="input" name="type" placeholder="task"/>
            </div>
            <div class="field" style="min-width:140px">
              <label>priority</label>
              <input class="input" name="priority" inputmode="numeric" placeholder="1"/>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>tags (comma)</label>
              <input class="input" name="tags" placeholder="ui, ops"/>
            </div>
            <div class="field">
              <label>assignee</label>
              <input class="input" name="assignee" placeholder=""/>
            </div>
            <div class="field">
              <label>external_ref</label>
              <input class="input" name="external_ref" placeholder=""/>
            </div>
            <div class="field">
              <label>parent</label>
              <input class="input" name="parent" placeholder=""/>
            </div>
          </div>

          <div class="row">
            <div class="field" style="flex:1 1 680px">
              <label>description</label>
              <textarea class="input" name="description" style="min-height:140px" placeholder="What & why."></textarea>
            </div>
          </div>

          <div class="row">
            <div class="field" style="flex:1 1 680px">
              <label>acceptance</label>
              <textarea class="input" name="acceptance" style="min-height:120px" placeholder="Definition of done."></textarea>
            </div>
          </div>
        </form>
      `,
      footHTML: `
        <button class="pill small" type="button" id="cancelNew">cancel</button>
        <button class="pill small ok" type="button" id="saveNew">create</button>
      `
    });

    $('#cancelNew')?.addEventListener('click', closeDialog);
    $('#saveNew')?.addEventListener('click', async () => {
      const form = $('#createForm');
      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());
      if (!payload.title || !payload.title.trim()){
        toast('Title required','warn'); return;
      }
      if (payload.priority) payload.priority = Number(payload.priority);
      try{
        const res = await api('/api/v1/tickets', { method:'POST', body: payload });
        toast('Created','ok', res.id);
        closeDialog();
        await loadTickets(true);
        state.tickets.selectedId = res.id;
        save();
        await loadTicketDetails(res.id, true);
        goto('tickets');
        await renderRoute();
      } catch (err){
        toast('Create failed','bad', err.message || String(err));
      }
    });
  }

  // Global UI bindings
  $('#refreshBtn').addEventListener('click', async () => {
    await refreshCurrent(true);
  });

  $('#createBtn').addEventListener('click', () => openCreateTicketDialog());

  $('#helpBtn').addEventListener('click', () => openShortcuts());

  function openShortcuts(){
    openDialog({
      title: 'Shortcuts',
      bodyHTML: `
        <div class="chipRow">
          <span class="chip"><span class="mono">g t</span> tickets</span>
          <span class="chip"><span class="mono">g o</span> overview</span>
          <span class="chip"><span class="mono">g m</span> teams</span>
          <span class="chip"><span class="mono">g r</span> memory</span>
          <span class="chip"><span class="mono">g w</span> workspace</span>
          <span class="chip"><span class="mono">g c</span> compound</span>
          <span class="chip"><span class="mono">g s</span> settings</span>
          <span class="chip"><span class="mono">/</span> focus search</span>
          <span class="chip"><span class="mono">r</span> refresh</span>
          <span class="chip"><span class="mono">l</span> toggle live</span>
          <span class="chip"><span class="mono">n</span> new ticket</span>
          <span class="chip"><span class="mono">Esc</span> close dialog</span>
        </div>
        <div class="muted small" style="margin-top:10px">
          Live mode polls tickets and the selected team (if any). No sockets here, unless you add them.
        </div>
      `,
      footHTML: `<button class="pill small" type="button" id="closeHelp">close</button>`
    });
    $('#closeHelp')?.addEventListener('click', closeDialog);
  }

  // Global search: bind to tickets local filter, but works anywhere
  const globalSearch = $('#globalSearch');
  globalSearch.addEventListener('input', async (e) => {
    const val = e.target.value;
    state.tickets.clientQ = val;
    save();
    if (routeFromHash() !== 'tickets') return;
    renderRoute();
  });

  // Live polling
  let liveTimer = null;

  function setLive(on){
    state.live = !!on;
    save();
    $('#liveState').textContent = state.live ? 'on' : 'off';
    $('#liveBtn').classList.toggle('info', state.live);
    if (state.live) startLive();
    else stopLive();
  }

  function startLive(){
    stopLive();
    const tick = async () => {
      // Light touch: tickets + selected team bundle
      if (routeFromHash() === 'tickets' || state.lastRoute === 'tickets'){
        data.tickets.at = 0;
        await loadTickets(true);
        // refresh selected ticket details less aggressively
        if (state.tickets.selectedId){
          await loadTicketDetails(state.tickets.selectedId, true);
        }
        if (routeFromHash() === 'tickets') await renderRoute();
      }
      if (state.teams.selected){
        await loadTeamBundle(state.teams.selected);
        if (routeFromHash() === 'teams') await renderRoute();
      }
    };
    liveTimer = setInterval(tick, Number(state.liveInterval || 5000));
    toast('Live on','info', `${Math.round((state.liveInterval||5000)/1000)}s polling`);
  }

  function stopLive(){
    if (liveTimer){ clearInterval(liveTimer); liveTimer = null; }
  }

  $('#liveBtn').addEventListener('click', () => setLive(!state.live));
  $('#liveInterval').value = String(state.liveInterval || 5000);
  $('#liveInterval').addEventListener('change', (e) => {
    state.liveInterval = Number(e.target.value || 5000);
    save();
    if (state.live) startLive();
  });

  async function refreshCurrent(loud=false){
    if (loud) toast('Refreshing','info', routes[routeFromHash()]?.title || routeFromHash());
    data.health = null;
    data.caps = null;
    data._hcAt = 0;

    if (routeFromHash() === 'tickets') data.tickets.at = 0;
    await loadHealthCaps(true);

    const route = routeFromHash();
    if (route === 'tickets') await loadTickets(true);
    if (route === 'teams') await loadTeams(true);
    if (route === 'workspace') await loadWorkspace(true);
    if (route === 'compound') await loadCompound(true);
    if (route === 'memory') await loadMemoryRecall(true);

    await renderRoute();
  }

  // Keyboard shortcuts
  let gPrefix = false;
  document.addEventListener('keydown', async (e) => {
    const tag = (document.activeElement?.tagName || '').toLowerCase();
    const typing = (tag === 'input' || tag === 'textarea' || tag === 'select');
    const k = e.key;

    if (k === 'Escape'){ closeDialog(); return; }

    if (!typing && k === '/'){
      e.preventDefault();
      goto('tickets');
      setTimeout(() => { $('#globalSearch')?.focus(); }, 0);
      return;
    }

    if (typing) return;

    if (k.toLowerCase() === 'g'){ gPrefix = true; setTimeout(() => gPrefix = false, 700); return; }
    if (gPrefix){
      const kk = k.toLowerCase();
      gPrefix = false;
      if (kk === 't') goto('tickets');
      if (kk === 'o') goto('overview');
      if (kk === 'm') goto('teams');
      if (kk === 'r') goto('memory');
      if (kk === 'w') goto('workspace');
      if (kk === 'c') goto('compound');
      if (kk === 's') goto('settings');
      return;
    }

    const kk = k.toLowerCase();
    if (kk === 'r'){ await refreshCurrent(true); }
    if (kk === 'l'){ setLive(!state.live); }
    if (kk === 'n'){ openCreateTicketDialog(); }
    if (kk === '?'){ openShortcuts(); }
  });

  // nav click (also keep hash navigation)
  $$('#nav a').forEach(a => {
    a.addEventListener('click', () => {
      state.lastRoute = a.getAttribute('data-route');
      save();
    });
  });

  // Init
  $('#baseMini').textContent = normBase(state.baseUrl);
  $('#liveState').textContent = state.live ? 'on' : 'off';
  if (!location.hash) location.hash = '#/' + (state.lastRoute || 'overview');
  setLive(state.live);

  (async () => {
    await loadHealthCaps(true);
    // preload tickets lightly so Overview nudge can work without friction
    await loadTickets(false);
    await renderRoute();
  })();

})();
</script>
</body>
</html>
