id: loom-compound-core
version: "0.2.0"
description: "Loom Compound Core: OpenCode/Claude/OMP compound scaffold + baseline Loom docs"
install_roots:
  - .opencode
  - .claude
  - .omp
  - .loom/compound
  - LOOM.md
  - AGENTS.md
managed_globs:
  - ".opencode/agents/**"
  - ".opencode/commands/**"
  - ".claude/agents/**"
  - ".claude/commands/**"
  - ".claude/settings.json"
  - ".opencode/compound/**"
  - ".opencode/plugins/**"
scaffold_globs:
  - "AGENTS.md"
  - "LOOM.md"
  - ".loom/compound/**"
  - ".omp/extensions/compound_engineering.ts"
  - ".opencode/.gitignore"
  - ".opencode/README.md"
  - ".opencode/memory/.gitignore"
  - ".opencode/tsconfig.json"
  - ".opencode/types/**"
  - ".opencode/skills/skill-authoring/**"
  - ".claude/skills/skill-authoring/**"
protected_globs:
  - ".git/**"
  - ".gitignore"
