openapi: 3.1.0
info:
  title: Loom Server API
  version: 1.0.0
  description: |
    OpenAPI spec for the Loom server module. Generated by tracing
    `src/agent_loom/server/app.py`.
servers:
  - url: http://127.0.0.1:8764
    description: Default local server
tags:
  - name: health
  - name: capabilities
  - name: introspection
  - name: tickets
  - name: teams
  - name: memory
  - name: workspace
  - name: compound
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
    LoomToken:
      type: apiKey
      in: header
      name: X-Loom-Token
  schemas:
    ErrorObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message, details]
    EnvelopeBase:
      type: object
      properties:
        ok:
          type: boolean
        data:
          nullable: true
        error:
          nullable: true
          $ref: "#/components/schemas/ErrorObject"
        meta:
          type: object
          additionalProperties: true
      required: [ok, data, error, meta]
    HealthData:
      type: object
      properties:
        platform: { type: string }
        python: { type: string }
        repo_root: { type: string }
        workspace_mode: { type: string }
        workspace_root: { type: string }
        writes_enabled: { type: boolean }
        token_required: { type: boolean }
      required:
        [platform, python, repo_root, workspace_mode, workspace_root, writes_enabled, token_required]
    CapabilitiesData:
      type: object
      properties:
        writes:
          type: object
          properties:
            enabled: { type: boolean }
          required: [enabled]
        auth:
          type: object
          properties:
            supported:
              type: array
              items: { type: string }
            require_token: { type: boolean }
          required: [supported, require_token]
        endpoints:
          type: array
          items:
            type: object
            properties:
              method: { type: string }
              path: { type: string }
            required: [method, path]
      required: [writes, auth, endpoints]
    IntrospectSymbol:
      type: object
      properties:
        name: { type: string }
        kind: { type: string }
        signature: { type: string }
        doc: { type: string }
        module: { type: string }
      required: [name, kind, signature, doc, module]
    IntrospectData:
      type: object
      properties:
        module: { type: string }
        symbols:
          type: array
          items: { $ref: "#/components/schemas/IntrospectSymbol" }
      required: [module, symbols]
    TicketSummary:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string }
        priority: { type: integer }
        assignee: { type: string }
        tags:
          type: array
          items: { type: string }
        claimed_by: { type: string }
        deps:
          type: array
          items: { type: string }
        blockers:
          type: array
          items: { type: string }
        mtime: { type: string }
      required:
        [id, title, status, priority, assignee, tags, claimed_by, deps, blockers, mtime]
    TicketListResult:
      type: object
      properties:
        count: { type: integer }
        tickets:
          type: array
          items: { $ref: "#/components/schemas/TicketSummary" }
      required: [count, tickets]
    TicketDetails:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string }
        priority: { type: integer }
        type: { type: string }
        assignee: { type: string }
        tags:
          type: array
          items: { type: string }
        deps:
          type: array
          items: { type: string }
        links:
          type: array
          items: { type: string }
        external_ref: { type: string }
        parent: { type: string }
        claimed_by: { type: string }
      required:
        [id, title, status, priority, type, assignee, tags, deps, links, external_ref, parent, claimed_by]
    TicketRelationships:
      type: object
      properties:
        blockers:
          type: array
          items: { type: string }
        blocking:
          type: array
          items: { type: string }
        children:
          type: array
          items: { type: string }
        linked:
          type: array
          items: { type: string }
      required: [blockers, blocking, children, linked]
    TicketShowResult:
      type: object
      properties:
        ticket: { $ref: "#/components/schemas/TicketDetails" }
        relationships: { $ref: "#/components/schemas/TicketRelationships" }
        body: { type: string }
        frontmatter:
          type: object
          additionalProperties: true
        lease:
          type: object
          additionalProperties: true
      required: [ticket, relationships, body, frontmatter, lease]
    TicketGraphEdge:
      type: object
      properties:
        src: { type: string }
        dst: { type: string }
        kind: { type: string }
      required: [src, dst, kind]
    TicketGraph:
      type: object
      properties:
        nodes:
          type: array
          items: { type: string }
        edges:
          type: array
          items: { $ref: "#/components/schemas/TicketGraphEdge" }
      required: [nodes, edges]
    TicketHealth:
      type: object
      properties:
        counts:
          type: object
          additionalProperties: true
        ready: { type: integer }
        blocked: { type: integer }
        bottlenecks:
          type: array
          items: { type: object, additionalProperties: true }
      required: [counts, ready, blocked, bottlenecks]
    TicketViewResult:
      type: object
      properties:
        ticket: { $ref: "#/components/schemas/TicketDetails" }
        graph: { $ref: "#/components/schemas/TicketGraph" }
        health: { $ref: "#/components/schemas/TicketHealth" }
      required: [ticket, graph, health]
    TicketDepResult:
      type: object
      properties:
        root: { type: string }
        nodes:
          type: array
          items: { type: string }
        edges:
          type: array
          items: { $ref: "#/components/schemas/TicketGraphEdge" }
        health: { $ref: "#/components/schemas/TicketHealth" }
      required: [root, nodes, edges, health]
    TicketSwarmAgent:
      type: object
      properties:
        agent: { type: string }
        active: { type: boolean }
        last_heartbeat: { type: string }
        claims:
          type: array
          items: { type: string }
      required: [agent, active, last_heartbeat, claims]
    TicketSwarmResult:
      type: object
      properties:
        agents:
          type: array
          items: { $ref: "#/components/schemas/TicketSwarmAgent" }
      required: [agents]
    TicketCreateRequest:
      type: object
      properties:
        title: { type: string }
        type: { type: string }
        priority: { type: integer }
        tags: { type: string, description: "comma-separated" }
        description: { type: string }
        assignee: { type: string }
        external_ref: { type: string }
        parent: { type: string }
        design: { type: string }
        acceptance: { type: string }
    TicketUpdateRequest:
      type: object
      properties:
        title: { type: string }
        status: { type: string }
        priority: { type: integer }
        type: { type: string }
        assignee: { type: string }
        tags: { type: string }
        external_ref: { type: string }
        body: { type: string }
        force: { type: boolean }
    TicketCreateResult:
      type: object
      properties:
        id: { type: string }
        path: { type: string }
      required: [id, path]
    TicketUpdateResult:
      type: object
      properties:
        id: { type: string }
      required: [id]
    TeamSummary:
      type: object
      properties:
        team: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        objective: { type: string }
        session: { type: string }
      required: [team, created_at, updated_at, objective, session]
    TeamListResult:
      type: object
      properties:
        teams:
          type: array
          items: { $ref: "#/components/schemas/TeamSummary" }
        count: { type: integer }
      required: [teams, count]
    TeamEventsResult:
      type: object
      properties:
        events:
          type: array
          items: { type: object, additionalProperties: true }
        count: { type: integer }
      required: [events, count]
    TeamInboxResult:
      type: object
      properties:
        unread:
          type: array
          items: { type: object, additionalProperties: true }
        read:
          type: array
          items: { type: object, additionalProperties: true }
      required: [unread, read]
    TeamCapturesResult:
      type: object
      properties:
        captures:
          type: array
          items: { type: object, additionalProperties: true }
        count: { type: integer }
      required: [captures, count]
    RecallScore:
      type: object
      properties:
        final: { type: number }
        fts: { type: number }
        bm25: { type: number, nullable: true }
        scope: { type: number }
        recency: { type: number }
      required: [final, fts, bm25, scope, recency]
    RecallWhy:
      type: object
      properties:
        matched_tags:
          type: array
          items: { type: string }
          nullable: true
        excluded_tags:
          type: array
          items: { type: string }
          nullable: true
        matched_scopes:
          type: array
          items: { type: object, additionalProperties: true }
          nullable: true
        excluded_scopes:
          type: array
          items: { type: object, additionalProperties: true }
          nullable: true
        fts_snippet: { type: string, nullable: true }
        recency_age_days: { type: number, nullable: true }
        via:
          type: array
          items: { type: string }
          nullable: true
        graph_distance: { type: integer, nullable: true }
    RecallItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        path: { type: string }
        visibility: { type: string }
        status: { type: string }
        tags:
          type: array
          items: { type: string }
        aliases:
          type: array
          items: { type: string }
        scopes:
          type: array
          items: { type: object, additionalProperties: true }
        created_at: { type: string }
        updated_at: { type: string }
        preview: { type: string }
        score:
          nullable: true
          $ref: "#/components/schemas/RecallScore"
        why:
          nullable: true
          $ref: "#/components/schemas/RecallWhy"
        role: { type: string }
        body: { type: string, nullable: true }
      required:
        [id, title, path, visibility, status, tags, aliases, scopes, created_at, updated_at, preview, role]
    RecallResult:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RecallItem" }
        context_text: { type: string }
        warnings:
          type: array
          items: { type: object, additionalProperties: true }
      required: [items, context_text, warnings]
    MemoryNote:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        tags:
          type: array
          items: { type: string }
        aliases:
          type: array
          items: { type: string }
        visibility: { type: string }
        status: { type: string }
        scopes:
          type: array
          items: { type: object, additionalProperties: true }
        links_frontmatter:
          type: array
          items: { type: string }
        frontmatter:
          type: object
          additionalProperties: true
      required:
        [id, title, body, created_at, updated_at, tags, aliases, visibility, status, scopes, links_frontmatter, frontmatter]
    MemoryNoteResult:
      type: object
      properties:
        note: { $ref: "#/components/schemas/MemoryNote" }
        warnings:
          type: array
          items: { type: string }
      required: [note, warnings]
    WorkspaceMeta:
      type: object
      properties:
        mode: { type: string }
        root: { type: string }
        groups:
          type: array
          items: { type: string }
        repos:
          type: array
          items: { type: string }
        paths:
          type: object
          additionalProperties: true
      required: [mode, root]
    WorktreeRepoEntry:
      type: object
      properties:
        mode: { type: string }
        path: { type: string }
        head: { type: string }
        branch: { type: string }
        ref: { type: string }
        detached: { type: boolean }
        locked: { type: boolean }
        is_repo: { type: boolean }
        dirty: { type: boolean }
      required:
        [mode, path, head, branch, ref, detached, locked, is_repo, dirty]
    WorktreeHarnessEntry:
      type: object
      properties:
        mode: { type: string }
        group: { type: string }
        repo: { type: string }
        path: { type: string }
        missing: { type: boolean }
        is_repo: { type: boolean }
        dirty: { type: boolean }
      required: [mode, group, repo, path, missing, is_repo, dirty]
    WorktreesResult:
      type: object
      properties:
        worktrees:
          type: array
          items:
            anyOf:
               - $ref: "#/components/schemas/WorktreeRepoEntry"
               - $ref: "#/components/schemas/WorktreeHarnessEntry"
        count: { type: integer }
      required: [worktrees, count]
    ComponentsIndexResult:
      type: object
      properties:
        index:
          nullable: true
          type: object
          additionalProperties: true
      required: [index]
    SkillSummary:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        skill_md: { type: string }
      required: [name, path, skill_md]
    SkillListResult:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: "#/components/schemas/SkillSummary" }
      required: [skills]
    SkillDetail:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        text: { type: string }
      required: [name, path, text]
paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Server health and configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/HealthData" }
  /api/v1/capabilities:
    get:
      tags: [capabilities]
      summary: Enumerate endpoints and auth capabilities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CapabilitiesData" }
  /api/v1/introspect/{subsystem}:
    get:
      tags: [introspection]
      summary: Introspect subsystem core module
      parameters:
        - in: path
          name: subsystem
          required: true
          schema:
            type: string
            enum: [ticket, team, memory, workspace, compound]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/IntrospectData" }
        "400":
          description: Unknown subsystem
  /api/v1/tickets:
    get:
      tags: [tickets]
      summary: List tickets
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: assignee
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: prio_min
          schema: { type: integer }
        - in: query
          name: prio_max
          schema: { type: integer }
        - in: query
          name: include_closed
          schema:
            type: string
            description: "1 (default) or 0"
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketListResult" }
    post:
      tags: [tickets]
      summary: Create ticket
      security:
        - BearerAuth: []
        - LoomToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TicketCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketCreateResult" }
        "401": { description: Unauthorized }
        "403": { description: Writes disabled }
        "400": { description: Create failed }
  /api/v1/tickets/{ticket_id}:
    get:
      tags: [tickets]
      summary: Show ticket
      parameters:
        - in: path
          name: ticket_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketShowResult" }
    patch:
      tags: [tickets]
      summary: Update ticket
      security:
        - BearerAuth: []
        - LoomToken: []
      parameters:
        - in: path
          name: ticket_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TicketUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketUpdateResult" }
        "401": { description: Unauthorized }
        "403": { description: Writes disabled }
        "400": { description: Update failed }
  /api/v1/tickets/{ticket_id}/view:
    get:
      tags: [tickets]
      summary: Ticket view (graph + health)
      parameters:
        - in: path
          name: ticket_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketViewResult" }
  /api/v1/tickets/{ticket_id}/dep:
    get:
      tags: [tickets]
      summary: Ticket dependency closure
      parameters:
        - in: path
          name: ticket_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketDepResult" }
  /api/v1/tickets/swarm:
    get:
      tags: [tickets]
      summary: Active ticket claims
      parameters:
        - in: query
          name: active_within
          schema: { type: string, default: "2h" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TicketSwarmResult" }
  /api/v1/teams:
    get:
      tags: [teams]
      summary: List team runs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TeamListResult" }
  /api/v1/teams/{team}/status:
    get:
      tags: [teams]
      summary: Team status snapshot
      parameters:
        - in: path
          name: team
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnvelopeBase" }
        "400": { description: TEAM_STATUS_FAILED }
  /api/v1/teams/{team}/run:
    get:
      tags: [teams]
      summary: Raw team run.json
      parameters:
        - in: path
          name: team
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnvelopeBase" }
        "404": { description: Team not found }
  /api/v1/teams/{team}/events:
    get:
      tags: [teams]
      summary: Team event log
      parameters:
        - in: path
          name: team
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: since
          schema: { type: string, description: "cursor filename" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TeamEventsResult" }
  /api/v1/teams/{team}/inbox:
    get:
      tags: [teams]
      summary: Team inbox (read/unread)
      parameters:
        - in: path
          name: team
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TeamInboxResult" }
  /api/v1/teams/{team}/captures:
    get:
      tags: [teams]
      summary: Team capture metadata
      parameters:
        - in: path
          name: team
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TeamCapturesResult" }
  /api/v1/memory/recall:
    get:
      tags: [memory]
      summary: Recall memory notes
      parameters:
        - in: query
          name: vault
          schema: { type: string, default: ".loom/memory" }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
        - in: query
          name: tag
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: not_tag
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: scope
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: not_scope
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: visibility
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - in: query
          name: include_deprecated
          schema: { type: string, description: "1 or 0" }
        - in: query
          name: expand
          schema: { type: integer, default: 0 }
        - in: query
          name: context
          schema: { type: string, description: "1 or 0" }
        - in: query
          name: deterministic
          schema: { type: string, description: "1 or 0" }
        - in: query
          name: format
          schema: { type: string, default: "json" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeBase"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RecallResult" }
  /api/v1/memory/notes/{note_id}:
