version: 1
metadata:
  name: YAML Sprint Foundations
members:
  - id: manager
    role: manager
    lifecycle: always_on
    source: loom
    agent: loom-team-manager
worktree_mappings:
  - pattern: "*"
    member: manager
communication:
  channel: inbox_only
  require_ack: true
  escalation:
    target_role: manager
    timeout_seconds: 900
unexpected_section: true
